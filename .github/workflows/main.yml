name: Lint and Spellcheck

on:
  push:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Install dependencies
        run: npm install -g prettier cspell

      - name: Make scripts executable
        run: chmod +x scripts/lint scripts/spellcheck

      - name: Run lint
        run: ./scripts/lint

      - name: Run spellcheck
        run: ./scripts/spellcheck

  test:
    runs-on: ubuntu-latest
    needs: [check]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gcc
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc g++

      - name: Install htmlq
        run: |
          wget -qO- https://github.com/mgdm/htmlq/releases/latest/download/htmlq-x86_64-linux.tar.gz
          sudo tar -xzf - -C /usr/local/bin
          sudo chmod +x /usr/local/bin/htmlq

      - name: Make scripts executable
        run: chmod +x scripts/test

      - name: Run test
        run: ./scripts/test
