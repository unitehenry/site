name: Lint and Spellcheck

on:
  push:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Install dependencies
        run: npm install -g prettier cspell

      - name: Make scripts executable
        run: chmod +x scripts/lint scripts/spellcheck

      - name: Run lint
        run: ./scripts/lint

      - name: Run spellcheck
        run: ./scripts/spellcheck

  test:
    runs-on: ubuntu-latest
    needs: [check]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install gcc
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc g++

      - name: Install htmlq
        run: |
          wget -qO- https://github.com/mgdm/htmlq/releases/latest/download/htmlq-x86_64-linux.tar.gz | \
          sudo tar -xzf - -C /usr/local/bin
          sudo chmod +x /usr/local/bin/htmlq

      - name: Setup Pandoc
        uses: pandoc/actions/setup@v1

      - name: Make scripts executable
        run: chmod +x scripts/test

      - name: Run test
        run: ./scripts/test

  build:
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install gcc
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc g++

      - name: Setup Pandoc
        uses: pandoc/actions/setup@v1

      - name: Make scripts executable
        run: chmod +x scripts/generate

      - name: Generate site
        run: ./scripts/generate

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: build

  deploy:
    runs-on: ubuntu-latest
    needs: [build]

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
